services:
  - type: web
    name: kagzso-identity-api
    runtime: python
    rootDir: backend
    buildCommand: apt-get update -y && apt-get install -y tesseract-ocr tesseract-ocr-hin libglib2.0-0 libgl1 && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
